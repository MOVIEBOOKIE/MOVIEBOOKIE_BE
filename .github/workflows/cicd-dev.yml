name: MovieBookie CI/CD For Dev Pipeline

on:
  pull_request:
    branches: [ "develop" ]
    paths-ignore:
      - "src/main/resources/db/changelog/**"
      - "src/main/resources/db/changelog-backup/**"
  push:
    branches: [ "develop" ]
    paths-ignore:
      - "src/main/resources/db/changelog/**"
      - "src/main/resources/db/changelog-backup/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 레포지토리 체크아웃
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.SUBMODULE_ACCESS_TOKEN }}
          submodules: true

      - name: Update submodule
        run: |
          git submodule update --remote --recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # gradle caching - 빌드 시간 향상
      - name: Gradle Caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        shell: bash

      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test -Pprofile=dev
        shell: bash

      - name: Liquibase schema gate (fail on mismatch)
        shell: bash
        run: |
          ./gradlew --no-daemon status -PrunList=devUpdate \
            -PDEV_DB_URL="${{ secrets.DEV_DB_URL }}" \
            -PDEV_DB_USERNAME="${{ secrets.DEV_DB_USERNAME }}" \
            -PDEV_DB_PASSWORD="${{ secrets.DEV_DB_PASSWORD }}" | tee liquibase-status.log

          PENDING_LINE=$(grep -Eo '[0-9]+ changesets have not been applied' liquibase-status.log | head -n 1 || true)
          if [[ -n "$PENDING_LINE" ]]; then
            PENDING_COUNT=$(echo "$PENDING_LINE" | awk '{print $1}')
            if [[ "$PENDING_COUNT" -gt 0 ]]; then
              echo "::error::Liquibase schema mismatch detected. Pending changesets: $PENDING_COUNT"
              exit 1
            fi
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: moviebookie-dev
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 Dev Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            ECR_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/moviebookie-dev:latest

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
            sudo docker pull $ECR_IMAGE

            sudo docker rm -f moviebookie-dev || true
            sudo docker image rm $ECR_IMAGE || true

            sudo docker run -d \
              --name moviebookie-dev \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=dev \
              -e TZ=Asia/Seoul \
              $ECR_IMAGE
