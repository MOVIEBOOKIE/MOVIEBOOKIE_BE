def loadPropertiesFile(String relativePath) {
    def propsFile = file(relativePath)
    if (!propsFile.exists()) {
        return [:]
    }

    def props = new Properties()
    propsFile.withInputStream { stream ->
        props.load(stream)
    }

    def asMap = [:]
    props.each { k, v ->
        asMap[k.toString()] = v?.toString()
    }
    return asMap
}

def resolvePropertiesPath(String envKey, List<String> candidates) {
    def fromEnv = System.getenv(envKey)
    if (fromEnv) {
        return fromEnv
    }

    def matched = candidates.find { candidate ->
        file(candidate).exists()
    }
    return matched
}

def sharedPropsPath = resolvePropertiesPath(
        'LIQUIBASE_SHARED_PROPERTIES',
        ['src/main/resources/secret/liquibase.properties', 'liquibase-shared.properties', 'liquibase.properties']
)
def localPropsPath = resolvePropertiesPath(
        'LIQUIBASE_LOCAL_PROPERTIES',
        ['liquibase-local.properties', 'src/main/resources/secret/liquibase-local.properties']
)

def sharedProps = sharedPropsPath ? loadPropertiesFile(sharedPropsPath) : [:]
def localProps = localPropsPath ? loadPropertiesFile(localPropsPath) : [:]

def getLbValue = { String key ->
    if (project.hasProperty(key)) {
        return project.property(key)?.toString()
    }
    if (localProps.containsKey(key)) {
        return localProps[key]
    }
    if (sharedProps.containsKey(key)) {
        return sharedProps[key]
    }
    return System.getenv(key)
}

ext {
    dbDriver = getLbValue('DB_DRIVER') ?: 'com.mysql.cj.jdbc.Driver'

    // dev DB
    devDbUrl = getLbValue('DEV_DB_URL')
    devDbUser = getLbValue('DEV_DB_USERNAME')
    devDbPass = getLbValue('DEV_DB_PASSWORD')

    // prod DB
    prodDbUrl = getLbValue('PROD_DB_URL')
    prodDbUser = getLbValue('PROD_DB_USERNAME')
    prodDbPass = getLbValue('PROD_DB_PASSWORD')

    // local DB
    localDbUrl = getLbValue('LOCAL_DB_URL') ?: getLbValue('DB_URL')
    localDbUser = getLbValue('LOCAL_DB_USER') ?: getLbValue('LOCAL_DB_USERNAME') ?: getLbValue('DB_USERNAME')
    localDbPass = getLbValue('LOCAL_DB_PASS') ?: getLbValue('LOCAL_DB_PASSWORD') ?: getLbValue('DB_PASSWORD')

    changelogDir = 'src/main/resources/db/changelog'
    diffOutputDir = "${changelogDir}/generated"

    commonDiffTypes = "tables, columns, primaryKeys, uniqueConstraints, indexes, foreignKeys, sequences"
    commonExcludeObjects = "view:.*"
}

def timestamp = new Date().format('yyyyMMdd_HHmmss')
file(diffOutputDir).mkdirs()

def runListValue = (project.findProperty('runList') ?: 'main').toString()
def requestedActivities = runListValue.split(',').collect { it.trim() }.findAll { it }

def requiredKeysByActivity = [
        main           : ['DEV_DB_URL', 'DEV_DB_USERNAME', 'DEV_DB_PASSWORD'],
        devUpdate      : ['DEV_DB_URL', 'DEV_DB_USERNAME', 'DEV_DB_PASSWORD'],
        prodUpdate     : ['PROD_DB_URL', 'PROD_DB_USERNAME', 'PROD_DB_PASSWORD'],
        localUpdate    : ['LOCAL_DB_URL', 'LOCAL_DB_USER', 'LOCAL_DB_PASS'],
        prodDiff       : ['DEV_DB_URL', 'DEV_DB_USERNAME', 'DEV_DB_PASSWORD',
                          'PROD_DB_URL', 'PROD_DB_USERNAME', 'PROD_DB_PASSWORD'],
        devDiff        : ['LOCAL_DB_URL', 'LOCAL_DB_USER', 'LOCAL_DB_PASS',
                          'DEV_DB_URL', 'DEV_DB_USERNAME', 'DEV_DB_PASSWORD'],
        localDiff      : ['DEV_DB_URL', 'DEV_DB_USERNAME', 'DEV_DB_PASSWORD',
                          'LOCAL_DB_URL', 'LOCAL_DB_USER', 'LOCAL_DB_PASS'],
        incrementalDiff: ['DEV_DB_URL', 'DEV_DB_USERNAME', 'DEV_DB_PASSWORD',
                          'LOCAL_DB_URL', 'LOCAL_DB_USER', 'LOCAL_DB_PASS']
]

def resolvedConfigByKey = [
        'DEV_DB_URL'      : devDbUrl,
        'DEV_DB_USERNAME' : devDbUser,
        'DEV_DB_PASSWORD' : devDbPass,
        'PROD_DB_URL'     : prodDbUrl,
        'PROD_DB_USERNAME': prodDbUser,
        'PROD_DB_PASSWORD': prodDbPass,
        'LOCAL_DB_URL'    : localDbUrl,
        'LOCAL_DB_USER'   : localDbUser,
        'LOCAL_DB_PASS'   : localDbPass
]

def missing = [] as Set
requestedActivities.each { activity ->
    def requiredKeys = requiredKeysByActivity[activity]
    if (requiredKeys != null) {
        requiredKeys.each { key ->
            def value = resolvedConfigByKey[key]
            if (value == null || value.toString().trim().isEmpty()) {
                missing << key
            }
        }
    }
}

if (!missing.isEmpty()) {
    throw new GradleException(
            "Liquibase required properties are missing for runList='${runListValue}': ${missing.sort().join(', ')}.\n" +
                    "Set them in one of these files:\n" +
                    " - src/main/resources/secret/liquibase.properties (team shared)\n" +
                    " - liquibase-local.properties (local only)\n" +
                    "or pass with -P<KEY>=<VALUE>."
    )
}

liquibase {
    activities {
        main {
            changelogFile "${changelogDir}/db.changelog-master.yaml"
            url devDbUrl
            username devDbUser
            password devDbPass
            driver dbDriver
        }

        prodDiff {
            def changelogFilePath = project.findProperty('liquibaseChangelogFile')
                    ?: "${diffOutputDir}/${timestamp}-prod-diff.yaml"
            changelogFile changelogFilePath

            // baseline (DEV)
            referenceUrl devDbUrl
            referenceUsername devDbUser
            referencePassword devDbPass

            // target (PROD)
            url prodDbUrl
            username prodDbUser
            password prodDbPass
            driver dbDriver

            diffTypes commonDiffTypes
            excludeObjects commonExcludeObjects
        }

        devDiff {
            def changelogFilePath = project.findProperty('liquibaseChangelogFile')
                    ?: "${diffOutputDir}/${timestamp}-dev-diff.yaml"
            changelogFile changelogFilePath

            // baseline (LOCAL)
            referenceUrl localDbUrl
            referenceUsername localDbUser
            referencePassword localDbPass

            // target (DEV)
            url devDbUrl
            username devDbUser
            password devDbPass
            driver dbDriver

            diffTypes commonDiffTypes
            excludeObjects commonExcludeObjects
        }

        localDiff {
            def changelogFilePath = project.findProperty('liquibaseChangelogFile')
                    ?: "${diffOutputDir}/${timestamp}-local-diff.yaml"
            changelogFile changelogFilePath

            // 기준 changelog 파일이 지정된 경우 사용
            def referenceChangelogFilePath = project.findProperty('referenceChangelogFile')
            if (referenceChangelogFilePath) {
                referenceChangelogFile referenceChangelogFilePath
            }

            // baseline (DEV)
            referenceUrl devDbUrl
            referenceUsername devDbUser
            referencePassword devDbPass

            // target (LOCAL)
            url localDbUrl
            username localDbUser
            password localDbPass
            driver dbDriver

            diffTypes commonDiffTypes
            excludeObjects commonExcludeObjects
        }

        incrementalDiff {
            def changelogFilePath = project.findProperty('liquibaseChangelogFile')
                    ?: "${diffOutputDir}/${timestamp}-incremental-diff.yaml"
            changelogFile changelogFilePath

            def baselineChangelogPath = project.findProperty('baselineChangelog')
            if (baselineChangelogPath) {
                referenceChangelogFile baselineChangelogPath
            }

            referenceUrl devDbUrl
            referenceUsername devDbUser
            referencePassword devDbPass

            url localDbUrl
            username localDbUser
            password localDbPass
            driver dbDriver
        }

        prodUpdate {
            changelogFile "${changelogDir}/db.changelog-master.yaml"
            url prodDbUrl
            username prodDbUser
            password prodDbPass
            driver dbDriver
        }

        devUpdate {
            changelogFile "${changelogDir}/db.changelog-master.yaml"
            url devDbUrl
            username devDbUser
            password devDbPass
            driver dbDriver
        }

        localUpdate {
            changelogFile "${changelogDir}/db.changelog-master.yaml"
            url localDbUrl
            username localDbUser
            password localDbPass
            driver dbDriver
        }
    }

    runList project.findProperty('runList') ?: 'main'
}
